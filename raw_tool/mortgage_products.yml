products:
  # ============================
  #  Обычная рыночная ипотека
  # ============================
  - id: mortgage_market
    category: mortgage
    mortgage_program: "standard"

    name: "Ипотечный кредит на рыночных условиях"
    purpose_segment: housing
    purposes:
      - housing_primary    # покупка квартиры на первичном рынке

    # Кому предоставляется
    eligibility:
      text: >
        Гражданам Республики Узбекистан, достигшим 18-летнего возраста,
        имеющим официальный доход и не достигшим установленного пенсионного возраста.
      citizen_uz_required: true
      age_min: 18
      age_max_male: 60        # TODO: уточнить по тарифу
      age_max_female: 60      # TODO: уточнить по тарифу
      official_income_required: true

    # Сумма кредита (общие лимиты)
    amount_min: null          # TODO: при необходимости задать минимум
    amount_max: 420000000     # TODO: сверить с тарифом

    # Лимиты по регионам и цели
    region_amount_limits:
      tashkent:
        housing_primary: 420000000
      regions:
        housing_primary: 330000000    # TODO: сверить

    # Срок кредита
    term_min_months: null            # TODO: при необходимости задать минимум
    term_max_months: 240             # до 20 лет

    # Первоначальный взнос, %
    downpayment_min_pct: 15.0        # TODO: уточнить по тарифу

    grace_default_months: null
    grace_rules: [ ]

    # Процентная ставка (упрощённо, фиксированная)
    apr_rules:
      - when: null
        apr: 18.0                    # TODO: уточнить ставку

    # Способ возврата
    repayment_types:
      - "аннуитет"
      - "дифференцированный"

    # Обеспечение
    collateral_options:
      - "залог приобретаемого жилого помещения"

    # Канал оформления
    channel: "branch"
    channel_text: >
      Кредит оформляется только в филиалах и ЦБУ Асакабанка (через ЦБУ).
      Оформление данного ипотечного кредита через мобильное приложение банка недоступно.

    # Стоп-факторы (инфо, не участвуют в логике чатбота)
    stop_factors:
      - "Наличие критических просрочек в кредитной истории (детализация по внутренним правилам банка)."
      - "Наличие задолженности по основному долгу, погашенной в судебном порядке и списанной с учёта."

    # Доп. условия (инфо, не участвуют в логике чатбота)
    extra_conditions:
      - "Необходимо отсутствие задолженностей и незавершённых заявок по обязательным платежам перед МИБ и коммерческими банками."
      - "Кредит предоставляется на приобретение жилья на первичном рынке."
      - "Оформление данного ипотечного кредита возможно только в филиалах и ЦБУ Асакабанка; продукт недоступен через мобильное приложение банка."

  # ============================
  #  Ипотека «Универсал»
  # ============================
  - id: mortgage_universal
    category: mortgage
    mortgage_program: "standard"

    name: "Ипотека «Универсал»"
    purpose_segment: housing
    purposes:
      - housing_primary
      - housing_secondary
      - housing_repair

    eligibility:
      text: >
        Гражданам Республики Узбекистан, достигшим 18-летнего возраста,
        имеющим официальный доход и не достигшим установленного пенсионного возраста.
      citizen_uz_required: true
      age_min: 18
      age_max_male: 60       # TODO
      age_max_female: 60     # TODO
      official_income_required: true

    # Общий максимум по сумме
    amount_min: null
    amount_max: 800000000    # TODO: сверить с тарифом

    # Лимиты по регионам и цели
    region_amount_limits:
      tashkent:
        housing_primary: 800000000
        housing_secondary: 800000000
      regions:
        housing_primary: 500000000
        housing_secondary: 500000000
      any:
        housing_repair: 170000000     # ремонт — единый лимит

    term_min_months: null
    term_max_months: 120             # TODO: сверить

    downpayment_min_pct: 25.0        # TODO: уточнить

    grace_default_months: null
    grace_rules: [ ]

    apr_rules:
      - when: null
        apr: 24.5                    # TODO: уточнить ставку

    repayment_types:
      - "аннуитет"
      - "дифференцированный"

    collateral_options:
      - "приобретаемое или ремонтируемое жилое помещение"

    channel: "branch"
    channel_text: >
      Кредит оформляется только в филиалах и ЦБУ Асакабанка.
      Через мобильное приложение данный продукт недоступен, оформление происходит при личном визите.

    stop_factors:
      - "В течение последних 12 месяцев не должно быть просрочек более 30 дней."
      - "В кредитной истории не должно быть проблемной задолженности, погашенной через суд и списанной с учёта."

    extra_conditions:
      - "Страховой взнос предусмотрен тарифами банка."
      - "Необходимо отсутствие задолженностей и незавершённых заявок по обязательным платежам перед МИБ и коммерческими банками."
      - "Оформление данного ипотечного кредита возможно только в филиалах и ЦБУ Асакабанка; продукт недоступен через мобильное приложение банка."

  # ============================
  #  Ипотека «Семья»
  # ============================
  - id: mortgage_family
    category: mortgage
    mortgage_program: "standard"

