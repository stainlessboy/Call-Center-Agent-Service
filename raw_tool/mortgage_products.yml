        имеющим официальный доход и не достигшим установленного пенсионного возраста.
      citizen_uz_required: true
      age_min: 18
      age_max_male: 60       # TODO
      age_max_female: 60     # TODO
      official_income_required: true

    amount_min: null
    amount_max: 800000000    # TODO: сверить

    region_amount_limits:
      tashkent:
        housing_primary: 800000000
      regions:
        housing_primary: 500000000

    term_min_months: null
    term_max_months: 240             # до 20 лет

    downpayment_min_pct: 25.0        # TODO: уточнить

    grace_default_months: null
    grace_rules: [ ]

    apr_rules:
      - when: null
        apr: 20.0                    # TODO: уточнить

    repayment_types:
      - "аннуитет"
      - "дифференцированный"

    collateral_options:
      - "приобретаемое жилое помещение"

    channel: "branch"
    channel_text: >
      Кредит оформляется только в филиалах и ЦБУ Асакабанка.
      Через мобильное приложение банк не оформляет данный продукт, требуется визит в отделение.

    stop_factors:
      - "В течение последних 12 месяцев не должно быть просрочек более 30 дней."
      - "В кредитной истории не должно быть проблемной задолженности, погашенной через суд и списанной с учёта."

    extra_conditions:
      - "Страховой взнос предусмотрен тарифами банка."
      - "Кредит может оформляться при наличии действующей ипотеки по внутренним правилам банка."
      - "Необходимо отсутствие задолженностей и незавершённых заявок по обязательным платежам перед МИБ и коммерческими банками."
      - "Оформление данного ипотечного кредита возможно только в филиалах и ЦБУ Асакабанка; продукт недоступен через мобильное приложение банка."

  # ============================
  #  Ипотека 2.4 (BI Group)
  # ============================
  - id: mortgage_bi_2_4
    category: mortgage
    mortgage_program: "bi_group"

    name: "Ипотека 2.4 (BI Group)"
    purpose_segment: housing
    purposes:
      - housing_primary        # только первичка

    eligibility:
      text: >
        Гражданам Республики Узбекистан, достигшим 18-летнего возраста
        и не достигшим установленного пенсионного возраста.
        Возможность подтверждения дохода и размер первоначального взноса
        уточняются в рамках продукта «Ипотека 2.4 (BI Group)».
      citizen_uz_required: true
      age_min: 18
      age_max_male: 60         # TODO: сверить с документом по проекту
      age_max_female: 60       # TODO: сверить
      official_income_required: false

    # Сумма кредита: линия A + линия B.
    amount_min: null
    amount_max: 2068000000

    region_amount_limits:
      any:
        housing_primary: 2068000000

    term_min_months: null
    term_max_months: 240        # общая витрина по длительности (по линии A)

    downpayment_min_pct: null

    downpayment_rules:
      - when: "income_proof"
        min_pct: 15.0
      - when: "!income_proof"
        min_pct: 30.0

    grace_default_months: null
    grace_rules: [ ]

    apr_rules:
      - when: null
        apr: 22.0              # не используется для линий, только для ранжирования

    repayment_types:
      - "аннуитет"
      - "дифференцированный"

    collateral_options:
      - >
        приобретаемое жилое помещение BI Group; до получения кадастрового паспорта
        возможно использование временного обеспечения (страховой полис или залог ликвидного имущества)
        по правилам продукта.

    channel: "branch"
    channel_text: >
      Кредит по проекту BI Group оформляется через филиалы и ЦБУ Асакабанка
      совместно с офисами продаж BI Group. Через мобильное приложение банк
      не оформляет данный продукт.

    bi_group_config:
      bxm_current: 412000

      line_a:
        max_amount: 420000000
        term_max_months: 240
        apr_before_cadastre: 23.0   # до кадастрового паспорта
        apr_after_cadastre: 18.0    # после кадастрового паспорта
        resource_name: "ресурсы Министерства экономики и финансов"

      line_b:
        max_multiple_bxm: 4000      # максимум 4000 * BXM
        term_max_months: 120
        apr_before_cadastre: 23.0   # до кадастрового паспорта
        apr_after_cadastre: 26.0    # после кадастрового паспорта
        resource_name: "собственные ресурсы Асакабанка"

      llm_notes:
        ru: >
          Сумма кредита по продукту «Ипотека 2.4 (BI Group)» делится на кредитные линии
          в зависимости от размера кредита.
          Если сумма кредита не превышает 420 000 000 сумов, открывается только линия A
          (ресурсы Министерства экономики и финансов) со сроком до 240 месяцев.
          Если сумма кредита превышает 420 000 000 сумов, открываются две кредитные линии:
          линия A на 420 000 000 сумов и линия B на оставшуюся сумму, но не более 4000 * BXM
          из собственных ресурсов Асакабанка. Для линии A годовая ставка составляет 23% до
          получения кадастрового паспорта и 18% после, для линии B — 23% до и 26% после получения
          кадастрового паспорта.

    stop_factors:
      - "Критические просрочки по кредитной истории по внутренним правилам проекта BI Group."
      - "Наличие проблемной задолженности, погашенной в судебном порядке и списанной с учёта."
      - "Прочие скоринговые ограничения продукта «Ипотека 2.4 (BI Group)»."

    extra_conditions:
      - "Кредиты предоставляются только на объекты BI Group (конкретный перечень комплексов уточняется банком)."
      - "Необходимо отсутствие задолженностей и незавершённых заявок по обязательным платежам перед МИБ и коммерческими банками."
      - "Детальные условия выбора линий A и B и перехода ставок после получения кадастрового паспорта определяются внутренними правилами банка."
      - "Оформление данного ипотечного кредита возможно только в филиалах и ЦБУ Асакабанка; продукт недоступен через мобильное приложение банка."

  - id: mortgage_nrg_2_4
    category: mortgage
    mortgage_program: nrg_2_4
    name: "Ипотека 2.4 (NRG)"
    purpose_segment: housing
    purposes:
      - housing_primary
    eligibility:
      text: >
        Гражданам Республики Узбекистан в возрасте от 18 до 60 лет,
        имеющим как официальный, так и неофициальный доход. Возможность
        подтверждения дохода и размер первоначального взноса уточняются
        в рамках продукта «Ипотека 2.4 (NRG)».
      citizen_uz_required: true
      age_min: 18
      age_max_male: 60
      age_max_female: 60
      official_income_required: false
    amount_min: null
    amount_max: 2068000000   # 420 млн + 4000 * 412 000
    region_amount_limits:
      any:
        housing_primary: 2068000000
    term_min_months: null
    term_max_months: 240
    grace_default_months: null
    grace_rules: [ ]
    apr_rules:
      - when: null
        apr: 22.0
    downpayment_min_pct: null
    downpayment_rules:
      - when: "income_proof"
        min_pct: 15.0
      - when: "!income_proof"
        min_pct: 30.0
    repayment_types:
      - "аннуитет"
      - "дифференцированный"
    collateral_options:
      - >
        приобретаемое жилое помещение NRG; до предоставления кадастровых
        документов в качестве обеспечения может использоваться страховой
        полис на случай невозврата кредита (на срок до 6 месяцев с момента
        выдачи кадастровых документов) либо залог ликвидного имущества.

    channel: "branch"
    channel_text: >
      Кредиты по проекту NRG оформляются через филиалы и ЦБУ Асакабанка,
      а также в торгово-жилищных комплексах NRG по правилам продукта.
      Через мобильное приложение данный продукт не оформляется.

    stop_factors:
      - "Если общее количество просроченных платежей на следующий месяц составляет 11 и более."
      - "Если количество просроченных платежей сроком от 30 до 60 дней составляет 5 и более."
      - "Если количество просроченных платежей сроком от 60 до 90 дней составляет 2 и более."
      - "Если количество просроченных платежей сроком 90 дней и более составляет 1 и более."
      - "Если по судебным процессам, пересмотренным условиям, списанной основной задолженности и внебалансовым обязательствам количество платежей составляет 1 и более."
      - "В случае формирования первоначального взноса по ипотеке в размере 50% и более кредитная история заемщика и совместного заемщика не проверяется."
    extra_conditions:
      - "Необходимо отсутствие задолженностей и открытых заявок по обязательным платежам перед МИБ и коммерческими банками."
      - "Кредит предоставляется для приобретения квартир в многоквартирных домах, строящихся или построенных подрядными организациями-партнёрами под брендом «NRG» (проекты NRG Jomiy, NRG Maftun makon, NRG Voha, NRG Yunusobod, NRG Zamon, NRG Qorasuv, NRG Yangi baxt и др.)."
      - "Реализация квартир осуществляется через торгово-жилищные комплексы (TJM) по правилам продукта."
      - "Оформление данного ипотечного кредита возможно только в филиалах и ЦБУ Асакабанка; продукт недоступен через мобильное приложение банка."
    bi_group_config:
      bxm_current: 412000
      line_a:
        max_amount: 420000000
        term_max_months: 240
        apr_before_cadastre: 23.0
        apr_after_cadastre: 18.0
        resource_name: "ресурсы Министерства экономики и финансов"
      line_b:
        term_max_months: 120
        apr_before_cadastre: 23.0
        apr_after_cadastre: 26.0
        max_multiple_bxm: 4000
        resource_name: "собственные ресурсы Асакабанка"
      llm_notes:
        ru: >
          Сумма кредита по продукту «Ипотека 2.4 (NRG)» делится на кредитные
          линии в зависимости от размера кредита. Если сумма кредита не
          превышает 420 000 000 сумов, открывается только линия A (ресурсы
          Министерства экономики и финансов) со сроком до 240 месяцев.
          Если сумма кредита превышает 420 000 000 сумов, открываются две
          кредитные линии: линия A на 420 000 000 сумов и линия B на
          оставшуюся сумму, но не более 4000 * BXM из собственных ресурсов
          Асакабанка. Для линии A годовая ставка составляет 23% до получения
          кадастрового паспорта и 18% после, для линии B — 23% до и 26% после
          получения кадастрового паспорта.

  - id: mortgage_daho
    category: mortgage
    mortgage_program: daho
    name: "Ипотека DAHO"
    purpose_segment: housing
    purposes:
      - housing_primary
    eligibility:
      text: >
        Гражданам Республики Узбекистан в возрасте от 18 до 60 лет,
        имеющим официальный или неофициальный доход. Детальные требования
        зависят от размера первоначального взноса и статуса самозанятости.
      citizen_uz_required: true
      age_min: 18
      age_max_male: 60
      age_max_female: 60
      official_income_required: false
    amount_min: null
    amount_max: null
    term_min_months: 36
    term_max_months: 108
    grace_default_months: null
    grace_rules: [ ]
    apr_rules:
      - when: null
        apr: 23.0
    downpayment_min_pct: null

    repayment_types:
      - "аннуитет"
      - "дифференцированный"

    collateral_options:
      - >
        Приобретаемое жилое помещение принимается в качестве обеспечения.
        До завершения строительства оформляется страховой полис или другое
        имущество в качестве залога. Размер обеспечения должен составлять
        не менее 125% суммы кредита для обычных клиентов и не менее 130%
        для лиц, связанных с банком.

    channel: "branch"
    channel_text: >
      Кредит по проекту DAHO оформляется через BXM и филиалы Асакабанка
      в городе Ташкент. Через мобильное приложение оформить данный продукт
      нельзя.

    stop_factors:
      - "Если общее количество просроченных платежей на следующий месяц составляет 11 и более."
      - "Если общее количество просроченных платежей сроком от 30 до 60 дней составляет 5 и более."
      - "Если общее количество просроченных платежей сроком от 60 до 90 дней составляет 2 и более."
      - "Если общее количество просроченных платежей сроком 90 дней и более составляет 1 и более."
      - "Если по судебным процессам, пересмотренным условиям, списанной основной задолженности и внебалансовым обязательствам количество платежей составляет 1 и более."
      - "В случае формирования первоначального взноса по ипотеке в размере 50% кредитная история заемщика и совместного заемщика не проверяется."

    extra_conditions:
      - "У клиентов, зарегистрированных как самозанятые лица и сформировавших первоначальный взнос в размере 40% и более, не требуется подтверждение официального дохода."
      - "У заемщика не должно быть текущего ипотечного кредита."
      - "Приобретение возможно только в жилых комплексах проекта DAHO, реализуемых в партнёрстве с банком."
      - "Кредит оформляется через BXM, расположенные в городе Ташкент."
      - "У заемщика не должно быть задолженностей и открытых заявок по обязательным платежам в МИБ и коммерческих банках."
      - "Оформление данного ипотечного кредита возможно только в филиалах и ЦБУ Асакабанка; продукт недоступен через мобильное приложение банка."

    daho_config:
      max_ltv_pct: 75.0
      offers:
