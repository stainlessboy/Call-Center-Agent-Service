        apr: 22
      - when: "income_proof && term<=9"
        apr: 24
      - when: "income_proof && term<=12"
        apr: 26
      - when: "payroll && term<=3"
        apr: 20
      - when: "payroll && term<=6"
        apr: 22
      - when: "payroll && term<=9"
        apr: 24
