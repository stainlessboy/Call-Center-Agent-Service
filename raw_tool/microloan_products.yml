products:
  - id: micro_online
    category: microloan
    channel: mobile_app
    channel_text: "Доступен для оформления через мобильное приложение Asakabank."
    name: "«Онлайн микрозайм» (через мобильное приложение)"
    purpose_segment: consumer
    purposes:
      - personal_any
    eligibility:
      text: >
        Гражданам Республики Узбекистан, достигшим 23-летнего возраста,
        имеющим официальный доход в течение последних 6 месяцев
        и не достигшим установленного пенсионного возраста (мужчины/женщины).
      citizen_uz_required: true
      age_min: 23          # TODO: подставить из тарифа, если другое
      age_max_male: 60     # TODO: максимум для мужчин по тарифу
      age_max_female: 55   # TODO: максимум для женщин по тарифу
    amount_min: 2000000
    amount_max: 100000000
    term_min_months: 3
    term_max_months: 48
    grace_default_months: null
    grace_rules: []
    apr_rules:
      - when: "income_proof && term<=24"
        apr: 29
      - when: "income_proof && term>24"
        apr: 31
      - when: "payroll && term<=24"
        apr: 25
      - when: "payroll && term>24"
        apr: 27
    repayment_types:
      - "аннуитет"
      - "дифференцированный"
    collateral_options:
      - "страховой полис"
    stop_factors:
      - "ограничения по количеству просроченных платежей в кредитном бюро (5+ просрочек и т.п., см. тариф)"
    extra_conditions:
      - "отсутствие задолженностей и незавершённых заявок по обязательным платежам перед МИБ и коммерческими банками"
      - "заёмщик не должен быть сотрудником АО «Asakabank»"

