  - id: micro_preferential
    category: microloan
    channel: branch_cbu
    channel_text: "Оформляется только в филиалах банка (ЦБУ), не через мобильное приложение."
    name: "«Льготный микрозайм» (через ЦБУ)"
    purpose_segment: consumer
    purposes:
